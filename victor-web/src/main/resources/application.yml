server:
  port: 8081
  servlet:
    context-path: /
  encoding:
    charset: UTF-8
    enabled: true
    force: true

spring:
  application:
    name: victor-service

  # HTTP编码配置
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

  # MVC编码配置
  mvc:
    charset: UTF-8

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/victor_experiment?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: victor123
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # Flyway配置
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # Kafka配置 - 优化批量处理
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      # 批量发送配置
      batch-size: 16384
      buffer-memory: 33554432
      linger-ms: 5
      compression-type: lz4
    consumer:
      group-id: victor-consumer
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      # 批量拉取配置
      max-poll-records: 500
      fetch-min-size: 1024
      fetch-max-wait: 500ms
      properties:
        spring.json.trusted.packages: "com.gateflow.victor.pipeline.ingestion.dto"
    listener:
      # 批量监听器配置
      type: batch
      ack-mode: MANUAL_IMMEDIATE
      concurrency: 3

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.gateflow.victor.domain.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# SpringDoc配置
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha

# 日志配置
logging:
  level:
    root: INFO
    com.gateflow.victor: DEBUG
    org.springframework.web: INFO

# Victor Pipeline配置
victor:
  pipeline:
    kafka-topic: victor-events
    batch-size: 100
  clickhouse:
    url: jdbc:clickhouse://localhost:8123/victor
    user: victor
    password: victor123
  stats:
    clickhouse:
      url: jdbc:clickhouse://localhost:8123/victor
      user: victor
      password: victor123