server:
  port: 8081
  servlet:
    context-path: /
  encoding:
    charset: UTF-8
    enabled: true
    force: true

spring:
  application:
    name: victor-service

  # HTTP encoding
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

  # MVC encoding
  mvc:
    charset: UTF-8

  # Active profile — set via SPRING_PROFILES_ACTIVE env var
  #   dev:  local Docker Compose (MySQL, Redis, Kafka, ClickHouse)
  #   prod: production (all secrets via env vars, no hardcoded defaults)

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.gateflow.victor.domain.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha

# Logging
logging:
  level:
    root: INFO
    com.gateflow.victor: INFO
    org.springframework.web: WARN
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,httptrace,scheduledtasks
  endpoint:
    health:
      show-details: always
      show-components: always
