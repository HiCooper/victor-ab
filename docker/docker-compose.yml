services:
  victor-service:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: victor-service
    ports:
      - "8080:8080"
    environment:
      VICTOR_DB_URL: jdbc:mysql://mysql:3306/victor_experiment?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      VICTOR_DB_USER: root
      VICTOR_DB_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - shared-infra

networks:
  shared-infra:
    external: true
