# =============================================================================
# Production profile — all secrets MUST be provided via environment variables.
# There are NO hardcoded fallback values for credentials or secrets.
# Activated by: SPRING_PROFILES_ACTIVE=prod
# =============================================================================

spring:
  # MySQL — credentials from vault/secrets manager
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${VICTOR_DB_URL}
    username: ${VICTOR_DB_USER}
    password: ${VICTOR_DB_PASSWORD}
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 10
      min-idle: 10
      max-active: 50
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: true
      test-on-return: false

  # Redis
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD}
      database: ${SPRING_DATA_REDIS_DATABASE:0}
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 20
          max-wait: -1ms
          max-idle: 20
          min-idle: 5

  # Flyway
  flyway:
    enabled: true
    url: ${VICTOR_DB_URL}
    user: ${VICTOR_DB_USER}
    password: ${VICTOR_DB_PASSWORD}
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    schemas: victor_experiment

  # Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 5
      delivery-timeout-ms: 10000
      request-timeout-ms: 5000
      max-block-ms: 5000
      batch-size: 32768
      buffer-memory: 67108864
      linger-ms: 10
      compression-type: lz4
    consumer:
      group-id: victor-consumer
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: latest
      enable-auto-commit: false
      max-poll-records: 500
      fetch-min-size: 1024
      fetch-max-wait: 500ms
      properties:
        spring.json.trusted.packages: "com.gateflow.victor.pipeline.ingestion.dto"
    listener:
      type: batch
      ack-mode: MANUAL_IMMEDIATE
      concurrency: 6
      observation-enabled: true
    template:
      observation-enabled: true

# Victor application config
victor:
  pipeline:
    kafka-topic: ${VICTOR_KAFKA_TOPIC:victor-events}
    batch-size: ${VICTOR_PIPELINE_BATCH_SIZE:200}
  clickhouse:
    url: ${VICTOR_CLICKHOUSE_URL}
    user: ${VICTOR_CLICKHOUSE_USER}
    password: ${VICTOR_CLICKHOUSE_PASSWORD}
  security:
    jwt:
      # WARNING: MUST be set via VICTOR_JWT_SECRET env var. Minimum 32 characters.
      # Generate with: openssl rand -base64 64
      secret: ${VICTOR_JWT_SECRET}
      expiration-ms: ${VICTOR_JWT_EXPIRATION:86400000}
    # 逗号分隔的 SDK API Key；强烈建议在生产配置以校验 SDK 面向接口
    sdk-api-keys: ${VICTOR_SDK_API_KEYS:}
  cors:
    # Comma-separated origins, e.g. "https://admin.example.com,https://app.example.com"
    allowed-origins: ${VICTOR_CORS_ORIGINS}

logging:
  level:
    root: WARN
    com.gateflow.victor: INFO
